<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Adminbereich</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="review.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Adminbereich</h1>
    <div id="loginSection">
      <input type="password" id="adminPassword" placeholder="Passwort">
      <button id="loginButton">Login</button>
    </div>
    <div id="adminPanel" style="display: none;">
      <h2>Unsichere Namen</h2>
      <ul id="nameList"></ul>
      <hr>
      <h3>Passwort ändern</h3>
      <input type="text" id="codeInput" placeholder="Wartungscode">
      <input type="password" id="newPass" placeholder="Neues Passwort">
      <button id="changePass">Ändern</button>
    </div>
  </div>
</body>
</html>
